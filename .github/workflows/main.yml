name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository with submodules
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Verify submodules
      run: |
        git submodule status
        ls -la app/src/main/jni/smolchat_android_llama.cpp/ || echo "Submodule path check"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Locate APK files
      run: |
        echo "Listing generated APKs:"
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: SmolChat-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
        compression-level: 6
        if-no-files-found: warn

    - name: Build Summary
      if: always()
      run: |
        if [ -f app/build/outputs/apk/debug/*.apk ]; then
          echo "✅ Build completed successfully!"
          echo "📦 APK size: $(du -h app/build/outputs/apk/debug/*.apk | cut -f1)"
        else
          echo "⚠️ Build may have issues - check logs above"
        fi
